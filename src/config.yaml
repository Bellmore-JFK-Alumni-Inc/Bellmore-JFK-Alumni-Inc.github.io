site:
  name: Bellmore JFK Alumni, Inc.
  site: 'https://bellmorejfkalumni.org'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null # or orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: Bellmore JFK Alumni, Inc.
    template: '%s — Bellmore JFK Alumni'
  description: 'Bellmore JFK Alumni, Inc. connects graduates of John F. Kennedy High School in Bellmore, NY. Join us for events, reunions, scholarships, and community support.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Bellmore JFK Alumni, Inc.
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@BellmoreJFKAlum'
    site: '@BellmoreJFKAlum'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: false
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: false

    list:
      isEnabled: false
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: false

    category:
      isEnabled: false
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: false

    tag:
      isEnabled: false
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-XZFBSHQ6CS' # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
